spring.application.name=orm-learn
#logging configuration
logging.level.org.springframework=info
logging.level.com.cognizant.orm_learn=debug

#hibernate sql logs - shows exact sql executed
logging.level.org.hibernate.sql=trace

#shows parameter values in sql
logging.level.org.hibernate.type.descriptor.sql=trace

#log format pattern
logging.pattern.console=%d{dd-MM-yy HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

#database connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

#hibernate configuration
# DDL-AUTO options explained:
# - create: Drops and recreates tables (DANGEROUS in production!)
# - create-drop: Creates tables, drops when session ends
# - update: Adds new columns/tables, doesn't remove existing
# - validate: Only checks if schema matches (SAFEST for production)
# - none: Does nothing
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
